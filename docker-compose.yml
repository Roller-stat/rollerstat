name: rollerstat

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: rollerstat-web
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    container_name: rollerstat-admin
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      ADMIN_PORT: 3001
      NEXT_TELEMETRY_DISABLED: "1"
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_URL: "http://localhost:3001"
      AUTH_URL: "http://localhost:3001"
    ports:
      - "3001:3001"
    restart: unless-stopped
